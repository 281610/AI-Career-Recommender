<!DOCTYPE html>
<html>
<head>
    <title>AI Career Chatbot</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 400px;
            height: 600px;
            background: white;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .chat-header {
            background: #4a47a3;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
        }

        .chat-box {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            background: #f4f4f9;
        }

        .message {
            margin: 10px 0;
            padding: 10px 15px;
            border-radius: 20px;
            max-width: 75%;
            font-size: 14px;
        }

        .user-message {
            background: #667eea;
            color: white;
            margin-left: auto;
        }

        .bot-message {
            background: #e0e0e0;
            color: black;
        }

        .chat-input {
            display: flex;
            padding: 10px;
            border-top: 1px solid #ddd;
        }

        .chat-input input {
            flex: 1;
            padding: 10px;
            border-radius: 20px;
            border: 1px solid #ccc;
            outline: none;
        }

        .chat-input button {
            margin-left: 10px;
            padding: 10px 15px;
            border-radius: 20px;
            border: none;
            background: #4a47a3;
            color: white;
            cursor: pointer;
        }

        .chat-input button:hover {
            background: #3734a9;
        }
    </style>
</head>
<body>

<div class="chat-container">

    <div class="chat-header">
        🤖 AI Career Chatbot
    </div>

    <div class="chat-box">

        {% if user_message %}
            <div class="message user-message">
                {{ user_message }}
            </div>
        {% endif %}

        {% if response %}
            <div class="message bot-message">
                {{ response }}
            </div>
        {% endif %}

    </div>

    <form method="POST" class="chat-input">
        <input type="text" name="message" placeholder="Type your career goal..." required>
        <button type="submit">Send</button>
    </form>

</div>

</body>
</html>
