<!DOCTYPE html>
<html>
<head>
    <title>AI Career Recommender</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 30px 40px;
            border-radius: 12px;
            width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        label {
            font-weight: bold;
            font-size: 14px;
        }

        select, input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 15px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        input[type="submit"] {
            background: #667eea;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        input[type="submit"]:hover {
            background: #5a67d8;
        }

    </style>
</head>

<body>

    <div class="container">
        <h2>🚀 AI Career Recommender</h2>

        <form action="/predict" method="post">

            <label>Interest</label>
            <select name="interest">
                {% for item in interests %}
                    <option value="{{ item }}">{{ item }}</option>
                {% endfor %}
            </select>

            <label>Skill Level</label>
            <select name="skill">
                {% for item in skills %}
                    <option value="{{ item }}">{{ item }}</option>
                {% endfor %}
            </select>

            <label>Aptitude (0-100)</label>
            <input type="number" name="aptitude" min="0" max="100" required>

            <label>Personality</label>
            <select name="personality">
                {% for item in personalities %}
                    <option value="{{ item }}">{{ item }}</option>
                {% endfor %}
            </select>

            <label>Education</label>
            <select name="education">
                {% for item in education_levels %}
                    <option value="{{ item }}">{{ item }}</option>
                {% endfor %}
            </select>

            <label>Work Type</label>
            <select name="work">
                {% for item in work_types %}
                    <option value="{{ item }}">{{ item }}</option>
                {% endfor %}
            </select>

            <input type="submit" value="Predict Career">

        </form>
    </div>

</body>
</html>
