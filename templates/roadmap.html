<!DOCTYPE html>
<html>
<head>
    <title>Career Roadmap</title>

    <style>
        *{
            margin: 0;
            padding: 0;
        }
        body {
            font-family: Arial;
            background: linear-gradient(135deg,#667eea,#764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 30px;
            width: 500px;
            border-radius: 12px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
        }

        ul {
            margin-top: 20px;
        }

        li {
            margin-bottom: 10px;
        }

        .btn {
            display: block;
            text-align: center;
            margin-top: 20px;
            padding: 10px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }

        .btn:hover {
            background: #5a67d8;
        }
    </style>
</head>

<body>

    <div class="card">
        <h2>📘 How to Become {{ career }}</h2>

        <ul>
            {% for step in steps %}
                <li>{{ step }}</li>
            {% endfor %}
        </ul>

        <a href="/" class="btn">🏠 Back to Home</a>
    </div>

</body>
</html>
