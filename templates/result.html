<!DOCTYPE html>
<html>
<head>
    <title>Career Result</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #43cea2, #185a9d);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .result-card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            width: 400px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            animation: fadeIn 0.6s ease-in-out;
        }

        h2 {
            color: #555;
            margin-bottom: 20px;
        }

        h1 {
            color: #185a9d;
            margin-bottom: 30px;
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            background: #43cea2;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            background: #36b18f;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <div class="result-card">
        <h2>🎯 Your Recommended Career</h2>
        <h1>{{ career }}</h1>

        <a href="/" class="btn">🔄 Try Again</a>
    </div>
    <div style="margin-top:20px;">
       
       <a href="/roadmap/{{ career }}" class="btn">
        📘 How to Become {{ career }}?
    </a>
    </div>
</body>
</html>
